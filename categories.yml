# Daily New Books Digest — Category Configuration
#
# Each category:
#   name:    Display name in the GitHub Issue
#   queries: List of Google Books search terms (tried in order until 5 books found)
#   active:  true  → included in daily digest
#            false → defined but skipped

categories:

  - name: "\U0001f916 AI & Machine Learning"
    queries:
      - "subject:artificial intelligence"
      - "subject:machine learning"
      - "subject:deep learning"
    active: true

