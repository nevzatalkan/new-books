<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 New Books Digest</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f6fa;
    --surface: #ffffff;
    --header-bg: #16213e;
    --accent: #0f3460;
    --link: #4a90e2;
    --text: #212529;
    --muted: #6c757d;
    --pill-bg: #eef2ff;
    --pill-text: #3730a3;
    --radius: 12px;
    --shadow: 0 2px 10px rgba(0,0,0,.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }

  a { color: var(--link); }
  a:hover { text-decoration: underline; }

  /* ── Header ── */
  header {
    background: var(--header-bg);
    color: #fff;
    padding: 1.5rem 1rem 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.3);
  }
  .header-row {
    max-width: 960px;
    margin: 0 auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 1rem;
  }
  header h1 { font-size: 1.4rem; flex: 1 1 auto; }

  #date-select {
    background: rgba(255,255,255,.12);
    color: #fff;
    border: 1px solid rgba(255,255,255,.25);
    border-radius: 8px;
    padding: 0.4rem 0.7rem;
    font-size: 0.9rem;
    cursor: pointer;
  }
  #date-select option { background: #16213e; }

  #toc {
    max-width: 960px;
    margin: 0.7rem auto 0;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
  }
  #toc a {
    background: rgba(255,255,255,.13);
    color: #fff;
    text-decoration: none;
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    font-size: 0.82rem;
    transition: background .15s;
    white-space: nowrap;
  }
  #toc a:hover { background: rgba(255,255,255,.28); }
  #toc .count {
    background: rgba(255,255,255,.22);
    border-radius: 10px;
    padding: 0 5px;
    font-size: 0.78rem;
  }

  /* ── Main ── */
  main {
    max-width: 960px;
    margin: 1.8rem auto;
    padding: 0 1rem 3rem;
  }

  /* ── Category section ── */
  .cat-section { margin-bottom: 2.5rem; }
  .cat-header {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 0.4rem;
    margin-bottom: 1.2rem;
  }
  .cat-header h2 { font-size: 1.2rem; }
  .cat-count {
    font-size: 0.8rem;
    background: #e2e8f0;
    color: var(--muted);
    border-radius: 10px;
    padding: 0.1rem 0.5rem;
  }

  /* ── Sub-sections ── */
  .sub-section { margin-bottom: 1.8rem; }
  .sub-header {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 0.9rem;
    padding: 0.3rem 0.7rem;
    background: #f0f4ff;
    border-left: 3px solid var(--link);
    border-radius: 0 6px 6px 0;
  }

  /* ── Book card ── */
  .book-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.1rem 1.2rem;
    margin-bottom: 0.9rem;
    box-shadow: var(--shadow);
    display: flex;
    gap: 1.2rem;
    transition: box-shadow .18s;
  }
  .book-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.13); }

  .book-cover {
    flex: 0 0 80px;
    display: flex;
    align-items: flex-start;
  }
  .book-cover img {
    width: 80px;
    height: 112px;
    object-fit: cover;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
    display: block;
  }
  .no-cover {
    width: 80px;
    height: 112px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
  }

  .cover-rating {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    margin-top: 0.35rem;
    line-height: 1.3;
  }

  .book-body { flex: 1; min-width: 0; }

  .book-title {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    line-height: 1.3;
  }
  .book-title a { color: var(--text); text-decoration: none; }
  .book-title a:hover { color: var(--link); }
  .src-icon { font-size: 0.85rem; margin-left: 3px; }

  .book-meta {
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 0.6rem;
  }

  .topics {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    margin-bottom: 0.5rem;
  }
  .topic {
    background: var(--pill-bg);
    color: var(--pill-text);
    font-size: 0.76rem;
    padding: 0.18rem 0.55rem;
    border-radius: 10px;
    font-weight: 500;
  }

  .audience {
    font-size: 0.86rem;
    color: #555;
    font-style: italic;
    margin-top: 0.3rem;
  }
  .description {
    font-size: 0.86rem;
    color: #444;
  }

  .book-footer {
    margin-top: 0.6rem;
    display: flex;
    justify-content: flex-end;
  }
  .back-top {
    font-size: 0.78rem;
    color: #bbb;
    text-decoration: none;
    padding: 0.2rem 0.5rem;
    border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .back-top:hover { color: var(--link); background: #f0f4ff; text-decoration: none; }

  /* ── States ── */
  .loading, .error {
    text-align: center;
    padding: 3rem;
    color: var(--muted);
    font-size: 1.1rem;
  }
  .error { color: #e53e3e; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.83rem;
    border-top: 1px solid #e2e8f0;
  }
  footer a { color: var(--muted); }

  /* ── Responsive ── */
  @media (max-width: 520px) {
    .book-card { flex-direction: column; }
    .book-cover { flex-direction: row; justify-content: center; }
  }
</style>
</head>
<body>

<a id="top"></a>

<header>
  <div class="header-row">
    <h1>📚 New Books Digest</h1>
    <select id="date-select" onchange="loadDate(this.value)">
      <option>Yükleniyor…</option>
    </select>
  </div>
  <nav id="toc"></nav>
</header>

<main id="content">
  <p class="loading">⏳ Yükleniyor…</p>
</main>

<footer>
  <a href="https://github.com/nevzatalkan/new-books" target="_blank" rel="noopener">nevzatalkan/new-books</a>
  · 🤖 Groq AI özeti · 📖 Open Library
</footer>

<script>
  // Resolve base path — strips filename if present (works for /new-books/ and /new-books/index.html)
  const BASE = (() => {
    const p = location.pathname.replace(/\/[^/]*$/, '/');
    return location.origin + p;
  })();

  async function json(path) {
    const r = await fetch(BASE + path + '?t=' + Date.now());
    if (!r.ok) throw new Error(`HTTP ${r.status}: ${path}`);
    return r.json();
  }

  // ── Render ─────────────────────────────────────────────────────────────────

  function esc(s) {
    if (!s) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderBook(book) {
    const stars  = book.rating ? `⭐ ${book.rating}/5 (${Number(book.ratings_count).toLocaleString('tr-TR')} oy)` : '';
    const src    = {'groq': '🤖', 'openlibrary': '📖', 'google': ''}[book.description_source] || '';

    const coverImg = book.thumbnail
      ? `<img src="${esc(book.thumbnail)}" alt="${esc(book.title)}" loading="lazy">`
      : `<div class="no-cover">📖</div>`;
    const starsUnder = stars ? `<div class="cover-rating">${esc(stars)}</div>` : '';
    const cover = `${coverImg}${starsUnder}`;

    const topicsHtml = (book.topics || [])
      .map(t => `<span class="topic">${esc(t)}</span>`)
      .join('');

    const bodyHtml =
      (book.description ? `<p class="description">${esc(book.description)}</p>` : '') +
      (topicsHtml ? `<div class="topics">${topicsHtml}</div>` : '') +
      (book.audience ? `<p class="audience">${esc(book.audience)}</p>` : '');

    const meta = [
      book.authors,
      book.published,
    ].filter(Boolean).join(' · ');

    return `
      <article class="book-card">
        <a href="${esc(book.link || '#')}" target="_blank" rel="noopener" class="book-cover">${cover}</a>
        <div class="book-body">
          <h3 class="book-title">
            <a href="${esc(book.link || '#')}" target="_blank" rel="noopener">${esc(book.title)}</a>
            ${src ? `<span class="src-icon" title="${src === '🤖' ? 'Groq AI özeti' : 'Open Library'}">${src}</span>` : ''}
          </h3>
          <p class="book-meta">${esc(meta)}</p>
          ${bodyHtml}
          <div class="book-footer"><a href="#top" class="back-top">↑ Yukarı</a></div>
        </div>
      </article>`;
  }

  function renderSubSection(label, books) {
    if (!books || !books.length) return '';
    return `
      <div class="sub-section">
        <h3 class="sub-header">${label}</h3>
        ${books.map(renderBook).join('')}
      </div>`;
  }

  function catTotal(cat) {
    return (cat.books || []).length +
           (cat.popular_recent || []).length +
           (cat.popular_classic || []).length;
  }

  function renderCategory(cat) {
    return `
      <section class="cat-section" id="${esc(cat.slug)}">
        <div class="cat-header">
          <h2>${esc(cat.name)}</h2>
          <span class="cat-count">${catTotal(cat)} kitap</span>
        </div>
        ${renderSubSection('🆕 Yeni Kitaplar', cat.books)}
        ${renderSubSection('⭐ Son 10 Yılın Popülerleri', cat.popular_recent)}
        ${renderSubSection('📜 Klasikler (10–100 Yıl)', cat.popular_classic)}
      </section>`;
  }

  function renderPage(data) {
    const toc = document.getElementById('toc');
    const content = document.getElementById('content');

    toc.innerHTML = data.categories
      .filter(c => catTotal(c) > 0)
      .map(c => `<a href="#${esc(c.slug)}">${esc(c.name)} <span class="count">${catTotal(c)}</span></a>`)
      .join('');

    content.innerHTML = data.categories
      .filter(c => catTotal(c) > 0)
      .map(renderCategory)
      .join('');
  }

  // ── Data loading ───────────────────────────────────────────────────────────

  async function loadDate(file) {
    if (!file) return;
    document.getElementById('content').innerHTML = '<p class="loading">⏳ Yükleniyor…</p>';
    document.getElementById('toc').innerHTML = '';
    try {
      const data = await json('data/' + file);
      renderPage(data);
    } catch (e) {
      document.getElementById('content').innerHTML = `<p class="error">Hata: ${esc(e.message)}</p>`;
    }
  }

  async function init() {
    try {
      const manifest = await json('data/manifest.json');
      const sel = document.getElementById('date-select');
      sel.innerHTML = manifest
        .map((m, i) =>
          `<option value="${esc(m.file)}"${i === 0 ? ' selected' : ''}>` +
          `${esc(m.date)} (${m.total} kitap)</option>`
        ).join('');
      if (manifest.length > 0) await loadDate(manifest[0].file);
    } catch (e) {
      document.getElementById('content').innerHTML =
        `<p class="error">
          Henüz digest verisi yok ya da yüklenemedi.<br>
          GitHub Actions → <strong>Daily New Books Digest</strong> → <em>Run workflow</em> ile ilk çalıştırmayı yap.<br>
          <small style="color:#aaa">(${esc(e.message)})</small>
        </p>`;
      document.getElementById('date-select').innerHTML = '<option>— veri yok —</option>';
    }
  }

  init();
</script>
</body>
</html>
