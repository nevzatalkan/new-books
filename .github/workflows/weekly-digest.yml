name: Daily New Books Digest

on:
  # Every day at 09:00 UTC
  schedule:
    - cron: "0 9 * * *"

  # Manual trigger (test from GitHub Actions tab)
  workflow_dispatch:

permissions:
  issues: write
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PAGES_URL: https://nevzatalkan.github.io/new-books/
        run: python src/digest.py

      - name: Commit & push digest data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || git commit -m "digest: $(date -u +%Y-%m-%d)"
          git push origin HEAD
